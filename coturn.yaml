apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      containers:
        - name: coturn
          image: coturn/coturn
          args:
            - -n
            - --log-file=stdout
            - --min-port=49160
            - --max-port=49200
            - --realm=netbird
            - --user=test:test123
          ports:
            - containerPort: 3478
              protocol: UDP
            - containerPort: 3478
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: coturn
  namespace: netbird
spec:
  type: NodePort
  selector:
    app: coturn
  ports:
    - name: turn-udp
      port: 3478
      targetPort: 3478
      nodePort: 30478
      protocol: UDP
    - name: turn-tcp
      port: 3478
      targetPort: 3478
      nodePort: 30479
      protocol: TCP
