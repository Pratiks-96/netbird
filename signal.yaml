apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-signal
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-signal
  template:
    metadata:
      labels:
        app: netbird-signal
    spec:
      containers:
        - name: signal
          image: netbirdio/signal:latest
          envFrom:
            - configMapRef:
                name: netbird-config
          ports:
            - containerPort: 10000
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-signal
  namespace: netbird
spec:
  type: NodePort
  selector:
    app: netbird-signal
  ports:
    - port: 10000
      targetPort: 10000
      nodePort: 30000
