apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-dashboard
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-dashboard
  template:
    metadata:
      labels:
        app: netbird-dashboard
    spec:
      containers:
        - name: dashboard
          image: netbirdio/dashboard:latest
          envFrom:
            - configMapRef:
                name: netbird-config
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
  namespace: netbird
spec:
  type: NodePort
  selector:
    app: netbird-dashboard
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
