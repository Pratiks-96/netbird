apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-management
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-management
  template:
    metadata:
      labels:
        app: netbird-management
    spec:
      containers:
        - name: management
          image: netbirdio/management:latest
          envFrom:
            - configMapRef:
                name: netbird-config
          ports:
            - containerPort: 33073
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-management
  namespace: netbird
spec:
  type: NodePort
  selector:
    app: netbird-management
  ports:
    - port: 33073
      targetPort: 33073
      nodePort: 30073
