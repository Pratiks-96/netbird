apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-management
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-management
  template:
    metadata:
      labels:
        app: netbird-management
    spec:
      initContainers:
        - name: copy-config
          image: busybox
          command: ["sh", "-c", "cp /config/management.json /etc/netbird/management.json"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: writable-config
              mountPath: /etc/netbird

      containers:
        - name: management
          image: netbirdio/management:latest
          ports:
            - containerPort: 33073
          volumeMounts:
            - name: writable-config
              mountPath: /etc/netbird

      volumes:
        - name: config
          configMap:
            name: netbird-management-config
        - name: writable-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-management
  namespace: netbird
spec:
  type: NodePort
  selector:
    app: netbird-management
  ports:
    - port: 33073
      targetPort: 33073
      nodePort: 30073
