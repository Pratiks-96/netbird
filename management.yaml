apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-management
  namespace: netbird
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netbird-management
  template:
    metadata:
      labels:
        app: netbird-management
    spec:
      containers:
        - name: management
          image: netbirdio/management:latest
          ports:
            - containerPort: 33073
          volumeMounts:
            - name: management-config
              mountPath: /etc/netbird
              readOnly: true
      volumes:
        - name: management-config
          configMap:
            name: netbird-management-config
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-management
  namespace: netbird
spec:
  type: NodePort
  selector:
    app: netbird-management
  ports:
    - port: 33073
      targetPort: 33073
      nodePort: 30073
